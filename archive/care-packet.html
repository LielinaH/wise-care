<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Care Packet</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .packet-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: flex-start;
    }
    @media (max-width: 1000px) { .packet-grid { grid-template-columns: 1fr; } }

    .packet-doc {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-2);
    }
    .packet-doc .doc-inner {
      background: var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 36px;
      position: relative;
    }
    .packet-doc .doc-inner::before {
      content: '';
      position: absolute;
      top: 0; left: 36px; right: 36px;
      height: 3px;
      background: linear-gradient(90deg, var(--teal-deep), var(--teal), var(--blue));
      border-radius: 0 0 var(--r-pill) var(--r-pill);
    }

    .doc-head {
      padding-bottom: 22px;
      margin-bottom: 26px;
      border-bottom: 1px solid var(--hairline);
      display: grid; grid-template-columns: 1fr auto; gap: 16px;
    }
    .doc-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; letter-spacing: -0.022em; margin: 0 0 6px; }
    .doc-sub { color: var(--muted); font-size: 13.5px; }
    .doc-meta-row { display: flex; gap: 18px; font-size: 12px; font-family: var(--font-mono); color: var(--muted); letter-spacing: 0.04em; }
    .doc-meta-row .k { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 2px; }
    .doc-meta-row .v { color: var(--fg); font-weight: 500; }

    .packet-section {
      padding: 22px 0;
      border-bottom: 1px solid var(--hairline);
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 24px;
    }
    .packet-section:last-of-type { border-bottom: 0; }
    @media (max-width: 700px) { .packet-section { grid-template-columns: 1fr; gap: 8px; } }
    .ps-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal-deep);
      padding-top: 2px;
    }
    .ps-body { font-size: 14.5px; color: var(--fg); line-height: 1.65; }
    .ps-body p { margin: 0 0 8px; }
    .ps-body p:last-child { margin-bottom: 0; }
    .ps-body ul { margin: 0; padding-left: 18px; }
    .ps-body li { margin-bottom: 4px; }
    .ps-body strong { color: var(--fg); font-weight: 600; }

    .outreach-msg {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--fg-soft);
      position: relative;
    }
    .outreach-msg::before {
      content: '';
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      background: linear-gradient(180deg, var(--teal), var(--teal-deep));
      border-radius: var(--r-pill);
    }
    .outreach-msg p:first-child { margin-top: 0; }
    .outreach-msg p:last-child { margin-bottom: 0; }

    .sidebar-stack { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 80px; }
    @media (max-width: 1000px) { .sidebar-stack { position: static; } }
    .action-card {
      padding: 22px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
    }
    .action-card .stack-btns { display: flex; flex-direction: column; gap: 8px; }
    .action-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      font-size: 13.5px;
      color: var(--fg);
      text-align: left;
      cursor: pointer;
      transition: all var(--t-fast);
      width: 100%;
    }
    .action-btn:hover { background: var(--surface-2); border-color: var(--border-2); }
    .action-btn .ico { width: 16px; height: 16px; color: var(--teal-deep); }

    .privacy-card {
      padding: 18px;
      background: var(--teal-soft);
      border: 1px solid oklch(58% 0.085 195 / 0.22);
      border-radius: var(--r-md);
      font-size: 12.5px;
      color: oklch(32% 0.07 200);
      line-height: 1.55;
    }
    .privacy-card strong { color: var(--teal-deep); font-weight: 600; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    document.getElementById('app-root').innerHTML = appShellHTML(`
      <div class="enter">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:24px;flex-wrap:wrap;">
          <div>
            <span class="kicker">Provider-ready summary</span>
            <h2 class="h2" style="margin: 8px 0 4px;">Your Care Packet</h2>
            <p style="color: var(--muted); margin: 0; font-size: 14.5px; max-width: 60ch;">
              A short, structured summary you can share with a clinician — only with your consent. Nothing here leaves Wise Care until you say so.
            </p>
          </div>
          <span class="badge teal"><span class="dot"></span>DRAFT · NOT YET SHARED</span>
        </div>

        <div class="packet-grid">
          <div class="packet-doc">
            <div class="doc-inner">
              <div class="doc-head">
                <div>
                  <h3 class="doc-title">Care Packet — Alex M.</h3>
                  <div class="doc-sub">Prepared by Wise Care · Not a clinical record · Not a diagnosis</div>
                </div>
                <div class="doc-meta-row">
                  <div><span class="k">Generated</span><span class="v">Today · 2 min ago</span></div>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Main concerns</div>
                <div class="ps-body">
                  <p><strong>Anxiety with sleep disruption</strong> — primary. <strong>Difficulty concentrating</strong> — secondary.</p>
                  <p style="color: var(--muted);">"Most evenings I can't quiet the worry. I fall asleep, but I wake up at 3am and stay up. Mornings feel heavy."</p>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Timeline</div>
                <div class="ps-body">
                  <p><strong>About six weeks.</strong> Worsening in the last two — coinciding with a project deadline at work.</p>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Impact on daily life</div>
                <div class="ps-body">
                  <ul>
                    <li><strong>Sleep:</strong> falling asleep okay, waking at 3am, struggling to get back to sleep.</li>
                    <li><strong>Concentration:</strong> noticeable drop at work — re-reading the same paragraph.</li>
                    <li><strong>Mood:</strong> heavier mornings, lighter as the day goes on.</li>
                    <li><strong>Relationships and appetite:</strong> unaffected.</li>
                  </ul>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Self-rated intensity</div>
                <div class="ps-body">
                  <p><strong>7 out of 10</strong> most days. Briefly 8 last week, 5 on better days.</p>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Safety</div>
                <div class="ps-body">
                  <p><strong>No safety concerns reported.</strong> No thoughts of self-harm or harming others. Crisis routing remains available throughout Wise Care.</p>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Care goals</div>
                <div class="ps-body">
                  <ul>
                    <li>Sleep through the night more consistently (4 of 7 nights → 6 of 7).</li>
                    <li>Reduce the intensity of evening worry to a 4–5 most days.</li>
                    <li>Maintain concentration at work without escalating in 4–6 weeks.</li>
                  </ul>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Questions to ask the provider</div>
                <div class="ps-body">
                  <ul>
                    <li>Given my pattern, would you start with CBT, ACT, or another approach?</li>
                    <li>How long do you typically work with someone for sleep-related anxiety?</li>
                    <li>What signs would suggest I should add medication evaluation?</li>
                    <li>What can I do this week, before our first session?</li>
                  </ul>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">To prepare before appointment</div>
                <div class="ps-body">
                  <ul>
                    <li>Track sleep onset and 3am wake-ups for 7 days.</li>
                    <li>Note evenings when worry felt manageable — what was different?</li>
                    <li>Bring a list of any caffeine, alcohol, or screen patterns in the evening.</li>
                  </ul>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Insurance &amp; payment</div>
                <div class="ps-body">
                  <p><strong>Aetna · self-pay backup.</strong> Sliding scale acceptable if in-network is unavailable. Telehealth preferred. Weekday evenings best.</p>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Suggested outreach message</div>
                <div class="ps-body">
                  <div class="outreach-msg">
                    <p>Hi — I'm looking to start weekly therapy for anxiety and sleep difficulty that have been ongoing for about six weeks. I'd prefer telehealth in the evenings, and I have Aetna or can self-pay sliding scale.</p>
                    <p>I've prepared a short care summary I can share if that's helpful before our first session. Are you taking new clients in the next two weeks?</p>
                    <p>Thank you — Alex</p>
                  </div>
                </div>
              </div>

              <div class="packet-section">
                <div class="ps-label">Next-step checklist</div>
                <div class="ps-body">
                  <ul class="check-list" style="margin-top: 4px;">
                    <li><div class="box"></div><span class="label">Send connection request to one or two providers</span></li>
                    <li><div class="box"></div><span class="label">Add a sleep tracker note this week</span></li>
                    <li><div class="box"></div><span class="label">Try one self-guided wind-down practice</span></li>
                    <li><div class="box"></div><span class="label">Re-check in seven days</span></li>
                  </ul>
                </div>
              </div>

            </div>
          </div>

          <div class="sidebar-stack">
            <div class="action-card">
              <h4 style="margin: 0 0 14px; font-size: 13px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-weight: 600;">Packet actions</h4>
              <div class="stack-btns">
                <button class="action-btn" id="copy-btn"><span class="ico">${icon('copy', 14)}</span> Copy summary to clipboard</button>
                <button class="action-btn" id="download-btn"><span class="ico">${icon('download', 14)}</span> Download as PDF</button>
                <a class="action-btn" href="connection-request.html"><span class="ico">${icon('send', 14)}</span> Share with selected provider</a>
                <button class="action-btn" id="save-btn"><span class="ico">${icon('check', 14)}</span> Save to dashboard</button>
              </div>
            </div>

            <div class="action-card">
              <h4 style="margin: 0 0 10px; font-size: 13px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-weight: 600;">Looks right?</h4>
              <p style="margin: 0 0 14px; font-size: 13.5px; color: var(--fg-soft); line-height: 1.55;">You can edit any section or regenerate from the original intake. Nothing is shared yet.</p>
              <a href="intake.html" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;">Edit intake answers</a>
            </div>

            <div class="privacy-card">
              <strong>${icon('lock', 14)} What gets shared</strong>
              Providers only see what you choose to send. You can redact sections before sending. Wise Care never shares with anyone you have not approved.
            </div>
          </div>
        </div>

        <div class="notice warn" style="margin-top: 24px;">
          <span id="not-ico"></span>
          <div><strong>This is not a clinical record.</strong> A Care Packet is a starting point for your first conversation. Your provider will form their own assessment, which is what we want — Wise Care does not replace clinical judgment.</div>
        </div>

      </div>
    `);

    mountAppShell({
      active: 'care-packet',
      title: 'Care Packet',
      crumbs: ['Care', 'Care route', 'Packet'],
      actions: `<a href="connection-request.html" class="btn btn-primary btn-sm">Share with provider<span class="inner">→</span></a>`,
    });

    document.getElementById('not-ico').innerHTML = icon('info', 16);

    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = document.querySelector('.packet-doc').innerText;
      navigator.clipboard?.writeText(text).catch(() => {});
      toast('Care Packet copied to clipboard');
    });
    document.getElementById('download-btn').addEventListener('click', () => {
      toast('PDF download started (prototype)');
    });
    document.getElementById('save-btn').addEventListener('click', () => {
      toast('Saved to dashboard');
    });
  </script>
</body>
</html>
