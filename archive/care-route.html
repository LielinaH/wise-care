<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Your care route</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .route-hero {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-2);
    }
    .route-hero .inner {
      background:
        radial-gradient(70% 100% at 100% 0%, oklch(58% 0.085 195 / 0.10), transparent 60%),
        var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 32px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 32px;
      align-items: center;
    }
    @media (max-width: 900px) { .route-hero .inner { grid-template-columns: 1fr; gap: 22px; } }
    .urgency-block {
      padding: 22px;
      background: var(--success-soft);
      border: 1px solid oklch(56% 0.11 158 / 0.24);
      border-radius: var(--r-md);
    }
    .urgency-block .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: oklch(36% 0.10 158); }
    .urgency-block .val { font-size: 1.5rem; font-weight: 600; color: oklch(28% 0.10 158); margin: 6px 0; letter-spacing: -0.02em; }
    .urgency-block .desc { font-size: 13.5px; color: oklch(36% 0.10 158); line-height: 1.55; }

    .route-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px 6px 6px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .route-pill .dot { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(180deg, var(--teal), var(--teal-deep)); }

    .reasoning-list {
      display: flex; flex-direction: column; gap: 10px;
      margin: 18px 0;
    }
    .reasoning-list li {
      display: flex; gap: 12px;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      font-size: 13.5px;
      color: var(--fg-soft);
      line-height: 1.55;
    }
    .reasoning-list .key { color: var(--teal-deep); font-weight: 600; min-width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding-top: 1px; }

    .support-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 800px) { .support-grid { grid-template-columns: 1fr; } }
    .support-card {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      transition: all var(--t-fast);
    }
    .support-card.featured {
      border-color: oklch(58% 0.085 195 / 0.35);
      background: linear-gradient(180deg, oklch(96% 0.018 195), var(--surface));
      box-shadow: var(--sh-1);
    }
    .support-card .ico {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface-sunk);
      color: var(--fg-soft);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .support-card.featured .ico { background: linear-gradient(180deg, var(--teal), var(--teal-deep)); color: white; }
    .support-card .t { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .support-card .d { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
    .support-card .tag { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--teal-deep); display: inline-block; margin-top: 8px; }

    .barrier-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 800px) { .barrier-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 500px) { .barrier-grid { grid-template-columns: 1fr; } }
    .barrier {
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
    }
    .barrier .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .barrier .name { font-size: 13px; font-weight: 600; color: var(--fg); }
    .barrier .desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .barrier.high .badge { background: var(--warn-soft); color: oklch(48% 0.13 78); border-color: oklch(70% 0.13 78 / 0.32); }
    .barrier.low .badge { background: var(--success-soft); color: oklch(38% 0.11 158); border-color: oklch(56% 0.11 158 / 0.24); }

    .route-action-card {
      margin-top: 24px;
      padding: 26px;
      background: linear-gradient(135deg, oklch(98% 0.012 195), oklch(98% 0.012 240));
      border: 1px solid oklch(58% 0.085 195 / 0.22);
      border-radius: var(--r-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }
    .route-action-card h3 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; letter-spacing: -0.018em; margin: 0 0 4px; }
    .route-action-card p { font-size: 13.5px; color: var(--fg-soft); margin: 0; max-width: 48ch; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    document.getElementById('app-root').innerHTML = appShellHTML(`
      <div class="enter-stagger stack" style="--gap: 24px;">

        <div class="route-hero">
          <div class="inner">
            <div>
              <div class="route-pill"><span class="dot"></span>CARE ROUTE · GENERATED 2 MIN AGO</div>
              <h2 class="h2" style="margin: 0 0 10px;">Therapy with a sleep and anxiety focus, weekly.</h2>
              <p class="lede">Based on a six-week pattern of evening worry and sleep disruption affecting your concentration, talk-based therapy is the most fitting first step. Medication evaluation is a backup option if therapy alone isn't enough over four to six weeks.</p>
              <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px;">
                <a href="provider-matching.html" class="btn btn-primary">View matched support options<span class="inner">→</span></a>
                <a href="care-packet.html" class="btn btn-ghost">Open Care Packet</a>
              </div>
            </div>
            <div class="urgency-block">
              <div class="lbl">URGENCY LEVEL</div>
              <div class="val">Routine</div>
              <div class="desc">No immediate risk indicators. A first appointment within 1–2 weeks is appropriate, with self-guided support in the interim.</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <div>
              <h3>Why this path?</h3>
              <div class="sub">A short reasoning summary — written so you can push back on it.</div>
            </div>
          </div>
          <ul class="reasoning-list">
            <li><span class="key">Pattern</span><div>You described <strong>anxiety + sleep disruption</strong> for six weeks. Both are highly responsive to short-term, structured therapy, which is why therapy is the primary recommendation.</div></li>
            <li><span class="key">Intensity</span><div>You rated intensity at <strong>7/10</strong>, with daily impact on sleep and concentration. This is significant but not acute — outpatient care is appropriate.</div></li>
            <li><span class="key">Safety</span><div>You reported <strong>no immediate risk</strong>. Crisis routing remains available throughout your experience if anything changes.</div></li>
            <li><span class="key">Preference</span><div>You preferred <strong>therapy</strong>, telehealth-first, weekday evenings. The recommended route honors all three.</div></li>
            <li><span class="key">Backup</span><div>If symptoms don't improve over <strong>4–6 weeks</strong> of therapy, a medication evaluation is a reasonable next step — not a first step.</div></li>
          </ul>
        </div>

        <div class="card">
          <div class="card-head">
            <div>
              <h3>What kinds of support fit this route?</h3>
              <div class="sub">Ranked by fit. You'll see specific matches on the next page.</div>
            </div>
          </div>
          <div class="support-grid">
            <div class="support-card featured">
              <div class="ico" id="s1"></div>
              <div style="flex:1;">
                <div class="t">Licensed therapist</div>
                <div class="d">Weekly talk-based therapy. Cognitive behavioral approaches are well-studied for anxiety + sleep.</div>
                <span class="tag">PRIMARY RECOMMENDATION</span>
              </div>
            </div>
            <div class="support-card">
              <div class="ico" id="s2"></div>
              <div style="flex:1;">
                <div class="t">Peer support group</div>
                <div class="d">Free weekly group. Useful as low-pressure support while you wait for a therapist appointment.</div>
                <span class="tag">SUPPLEMENTAL</span>
              </div>
            </div>
            <div class="support-card">
              <div class="ico" id="s3"></div>
              <div style="flex:1;">
                <div class="t">Community clinic</div>
                <div class="d">In-person, sliding scale, no insurance required. Suitable if cost or insurance becomes a barrier.</div>
                <span class="tag">ALTERNATE</span>
              </div>
            </div>
            <div class="support-card">
              <div class="ico" id="s4"></div>
              <div style="flex:1;">
                <div class="t">Medication evaluation</div>
                <div class="d">Reserved as a backup if therapy alone is insufficient. Not the first step we recommend.</div>
                <span class="tag">BACKUP</span>
              </div>
            </div>
            <div class="support-card">
              <div class="ico" id="s5"></div>
              <div style="flex:1;">
                <div class="t">Self-guided support</div>
                <div class="d">Evidence-based sleep hygiene and worry-management exercises. Useful starting tonight.</div>
                <span class="tag">USE WHILE WAITING</span>
              </div>
            </div>
            <div class="support-card">
              <div class="ico" id="s6"></div>
              <div style="flex:1;">
                <div class="t">Crisis support</div>
                <div class="d">Always available if symptoms worsen or thoughts of self-harm arise. 988 · 24/7.</div>
                <span class="tag">ALWAYS AVAILABLE</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <div>
              <h3>Care barriers we detected</h3>
              <div class="sub">Things that often slow people down. We've factored them into your matches.</div>
            </div>
          </div>
          <div class="barrier-grid">
            <div class="barrier high">
              <div class="head"><span class="name">Provider availability</span><span class="badge">DETECTED</span></div>
              <div class="desc">In your state, average wait time for a new therapist appointment is 3–4 weeks. We've prioritized practices with shorter waitlists.</div>
            </div>
            <div class="barrier high">
              <div class="head"><span class="name">Insurance match</span><span class="badge">PARTIAL</span></div>
              <div class="desc">Aetna in-network coverage is moderate. We've also surfaced sliding-scale and self-pay options as a fallback.</div>
            </div>
            <div class="barrier low">
              <div class="head"><span class="name">Cost</span><span class="badge">MANAGEABLE</span></div>
              <div class="desc">Sliding scale and EAP options bring sessions to $40–$140 range.</div>
            </div>
            <div class="barrier low">
              <div class="head"><span class="name">Location</span><span class="badge">NOT A BARRIER</span></div>
              <div class="desc">Telehealth removes the geographic constraint. Your state is covered by multiple matched providers.</div>
            </div>
            <div class="barrier low">
              <div class="head"><span class="name">Urgency</span><span class="badge">ROUTINE</span></div>
              <div class="desc">Your urgency is routine — within 1–2 weeks. No need for same-week intervention.</div>
            </div>
            <div class="barrier high">
              <div class="head"><span class="name">Uncertainty</span><span class="badge">COMMON</span></div>
              <div class="desc">It is normal to not know which provider is right. The Care Packet helps the first conversation get past introductions faster.</div>
            </div>
          </div>
        </div>

        <div class="notice warn">
          <span id="dis-ico"></span>
          <div>
            <strong>Important.</strong> Wise Care is a navigation tool, not a clinical service. The recommendations above are starting points for a conversation with a licensed professional — they are not a diagnosis, treatment plan, or prescription. If your symptoms worsen, please reach out to a clinician or, in a crisis, call or text <strong>988</strong>.
          </div>
        </div>

        <div class="route-action-card">
          <div>
            <h3>Ready to see who fits?</h3>
            <p>Five support options are waiting — filtered by your insurance, location, and preferences. You can save options, request connections, and share your Care Packet with consent at every step.</p>
          </div>
          <a href="provider-matching.html" class="btn btn-primary btn-lg">View matched options<span class="inner">5 options →</span></a>
        </div>

      </div>
    `);

    mountAppShell({
      active: 'care-route',
      title: 'Care route',
      crumbs: ['Care', 'Care route'],
      actions: `
        <a href="care-packet.html" class="btn btn-ghost btn-sm">Open packet</a>
        <a href="provider-matching.html" class="btn btn-primary btn-sm">See options<span class="inner">→</span></a>
      `,
    });

    ['s1','s2','s3','s4','s5','s6'].forEach((id, i) => {
      const ic = ['heart','users','building','spark','spark','alert'][i];
      document.getElementById(id).innerHTML = icon(ic, 18);
    });
    document.getElementById('dis-ico').innerHTML = icon('info', 16);
  </script>
</body>
</html>
