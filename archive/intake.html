<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Private intake</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .intake-wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    .intake-progress {
      position: sticky;
      top: 78px;
      z-index: 5;
      background: var(--bg);
      padding: 14px 0 18px;
      margin: -18px 0 28px;
      border-bottom: 1px solid var(--hairline);
    }
    .step-card {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-1);
    }
    .step-card .inner {
      background: var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 32px;
    }
    .step-card h2 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 2.6vw, 1.9rem);
      font-weight: 600;
      letter-spacing: -0.022em;
      line-height: 1.15;
      margin: 14px 0 8px;
    }
    .step-card p.sub { color: var(--muted); font-size: 14.5px; line-height: 1.55; margin: 0 0 22px; max-width: 56ch; }

    .step-foot {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid var(--hairline);
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
    }
    .save-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; color: var(--muted);
      font-family: var(--font-mono); letter-spacing: 0.04em;
    }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    .slider-card {
      padding: 18px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
    }
    .scale-rail { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 8px; letter-spacing: 0.05em; }
    .intensity-display {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--teal-deep);
      text-align: center;
    }
    .intensity-label { text-align: center; font-size: 13px; color: var(--muted); margin-top: 4px; }

    .crisis-card {
      padding: 24px;
      background: var(--danger-soft);
      border: 1px solid oklch(58% 0.17 25 / 0.32);
      border-radius: var(--r-lg);
      display: flex; gap: 16px;
      margin-top: 16px;
    }
    .crisis-card .ico { width: 36px; height: 36px; border-radius: 10px; background: var(--danger); color: white; display: grid; place-items: center; flex-shrink: 0; }
    .crisis-card h3 { margin: 0 0 6px; color: oklch(38% 0.13 25); font-size: 1.05rem; font-weight: 600; }
    .crisis-card p { margin: 0 0 14px; font-size: 13.5px; color: oklch(40% 0.13 25); line-height: 1.55; }
    .crisis-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .crisis-btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--danger);
      color: white;
      font-size: 13.5px;
      font-weight: 500;
      display: inline-flex; gap: 6px; align-items: center;
    }
    .crisis-btn.alt {
      background: var(--surface);
      color: var(--danger);
      border: 1px solid oklch(58% 0.17 25 / 0.32);
    }

    .review-section {
      padding: 14px 0;
      border-bottom: 1px solid var(--hairline);
      display: flex; justify-content: space-between; gap: 14px; align-items: flex-start;
    }
    .review-section:last-of-type { border-bottom: 0; }
    .review-k { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); width: 160px; flex-shrink: 0; }
    .review-v { flex: 1; font-size: 14px; color: var(--fg); line-height: 1.55; }
    .review-v .tag-row { margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    const STEPS = [
      { id: 'concerns', title: "What's bringing you here today?", sub: "Pick any that fit. You can add detail below." },
      { id: 'timeline', title: "How long has this been happening?", sub: "And how intense does it feel right now?" },
      { id: 'impact', title: "How is it affecting your day-to-day?", sub: "Select what's been getting harder. There's no right answer." },
      { id: 'safety', title: "A safety check.", sub: "This question is sensitive but important. Your answer changes what we recommend next." },
      { id: 'preference', title: "What kind of support sounds right?", sub: "It's okay to not be sure — we'll suggest a path either way." },
      { id: 'practical', title: "A few practical details.", sub: "These help us match options that actually fit your situation." },
      { id: 'review', title: "Review and continue.", sub: "Make sure this looks right before AI agents prepare your care route." },
    ];

    const state = Object.assign({
      concerns: [],
      concernDetail: '',
      duration: 'weeks',
      intensity: 5,
      impact: [],
      safety: null,
      preference: '',
      insurance: '',
      modality: '',
      stateName: '',
      urgency: '',
    }, getIntake());

    let stepIndex = parseInt(localStorage.getItem(STORAGE_KEYS.intakeStep) || '0', 10);
    if (isNaN(stepIndex) || stepIndex < 0 || stepIndex >= STEPS.length) stepIndex = 0;

    function persist() {
      setIntake(state);
      localStorage.setItem(STORAGE_KEYS.intakeStep, String(stepIndex));
    }

    function render() {
      const pct = Math.round(((stepIndex) / (STEPS.length - 1)) * 100);
      const stepRail = STEPS.map((_, i) => `<span class="step ${i < stepIndex ? 'done' : i === stepIndex ? 'active' : ''}"></span>`).join('');

      const stepHtml = renderStep();
      const isCrisis = stepIndex === 3 && state.safety === 'immediate';

      document.getElementById('app-root').innerHTML = appShellHTML(`
        <div class="intake-wrap enter">
          <div class="intake-progress">
            <div class="row-between" style="margin-bottom: 10px;">
              <div class="progress">
                <span>Step ${stepIndex + 1} of ${STEPS.length}</span>
                <div class="progress-bar"><div style="width: ${Math.max(8, pct)}%"></div></div>
                <span>${pct}%</span>
              </div>
              <div class="save-row">
                <span class="save-dot"></span>Saved · private to you
              </div>
            </div>
            <div class="step-rail">${stepRail}</div>
          </div>

          <div class="step-card">
            <div class="inner">
              <span class="kicker">Private intake · structured</span>
              <h2>${STEPS[stepIndex].title}</h2>
              <p class="sub">${STEPS[stepIndex].sub}</p>

              ${stepHtml}

              ${isCrisis ? renderCrisis() : ''}

              <div class="step-foot">
                <button class="btn btn-ghost btn-sm" id="prev-btn" ${stepIndex === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
                <div style="font-size: 12px; color: var(--muted);">${stepIndex < STEPS.length - 1 ? 'Your answers are saved as you go.' : 'Ready when you are.'}</div>
                <button class="btn btn-primary btn-sm" id="next-btn">
                  ${stepIndex === STEPS.length - 1 ? 'Continue to AI review' : 'Next'}
                  <span class="inner">→</span>
                </button>
              </div>
            </div>
          </div>

          <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px;">
            <div class="notice" style="flex: 1; min-width: 260px;">
              <span id="resp-ico"></span>
              <div><strong style="color: var(--fg);">Responsible AI.</strong> Wise Care does not diagnose, treat, or prescribe. We use your answers only to suggest a care route in this session.</div>
            </div>
            <div class="notice warn" style="flex: 1; min-width: 260px;">
              <span id="warn-ico"></span>
              <div><strong>If anything feels urgent right now</strong>, please call or text <strong>988</strong>, or call <strong>911</strong> in an emergency. You don't have to finish this form first.</div>
            </div>
          </div>

        </div>
      `);

      mountAppShell({
        active: 'intake',
        title: 'Private intake',
        crumbs: ['Care', 'Intake'],
        actions: `<a href="user-dashboard.html" class="btn btn-quiet btn-sm">Save &amp; exit</a>`,
      });

      document.getElementById('resp-ico').innerHTML = icon('info', 16);
      document.getElementById('warn-ico').innerHTML = icon('alert', 16);

      bindStepEvents();

      document.getElementById('next-btn').addEventListener('click', () => {
        if (stepIndex < STEPS.length - 1) { stepIndex++; persist(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        else { persist(); window.location.href = 'ai-processing.html'; }
      });
      document.getElementById('prev-btn').addEventListener('click', () => {
        if (stepIndex > 0) { stepIndex--; persist(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
      });
    }

    function renderCrisis() {
      return `
        <div class="crisis-card">
          <div class="ico" id="cr-ico"></div>
          <div style="flex:1;">
            <h3>If you may be in immediate danger, please reach out now.</h3>
            <p>You don't have to finish this form. Wise Care isn't a crisis service. The people on the other end of these lines are trained for this — and they will listen.</p>
            <div class="crisis-actions">
              <a class="crisis-btn" href="#">Call or text 988</a>
              <a class="crisis-btn" href="#">Chat with 988 online</a>
              <a class="crisis-btn alt" href="#">Call 911 (emergency)</a>
            </div>
          </div>
        </div>
      `;
    }

    function renderStep() {
      const s = STEPS[stepIndex].id;
      if (s === 'concerns') return stepConcerns();
      if (s === 'timeline') return stepTimeline();
      if (s === 'impact') return stepImpact();
      if (s === 'safety') return stepSafety();
      if (s === 'preference') return stepPreference();
      if (s === 'practical') return stepPractical();
      if (s === 'review') return stepReview();
      return '';
    }

    function stepConcerns() {
      const opts = [
        { v: 'anxiety', l: 'Anxiety or worry', s: 'Racing thoughts, on edge, hard to relax' },
        { v: 'depression', l: 'Low mood or sadness', s: 'Persistent sadness, lack of motivation' },
        { v: 'sleep', l: 'Sleep difficulties', s: 'Falling asleep, staying asleep, waking early' },
        { v: 'stress', l: 'Stress or burnout', s: 'Work, school, caregiving, life pressure' },
        { v: 'grief', l: 'Grief or loss', s: 'Recent loss or major change' },
        { v: 'relationships', l: 'Relationships', s: 'Family, partner, friendship strain' },
        { v: 'trauma', l: 'Past difficult experiences', s: 'Things from the past resurfacing' },
        { v: 'other', l: 'Something else', s: 'You can describe it below' },
      ];
      return `
        <div class="choice-grid">
          ${opts.map(o => `
            <button class="choice ${state.concerns.includes(o.v) ? 'selected' : ''}" data-concern="${o.v}" type="button">
              <span class="check">${icon('check', 12)}</span>
              <div>
                <div class="label">${o.l}</div>
                <div class="sub">${o.s}</div>
              </div>
            </button>
          `).join('')}
        </div>
        <div class="field" style="margin-top: 18px;">
          <label class="field-label">Anything you'd like to add? (optional)</label>
          <textarea class="textarea" id="concern-detail" placeholder="A sentence or two helps a lot. You can be as brief as you want.">${state.concernDetail || ''}</textarea>
          <span class="field-hint">Your words go straight to your private summary. Nothing is shared without consent.</span>
        </div>
      `;
    }

    function stepTimeline() {
      const durations = [
        { v: 'days', l: 'A few days' },
        { v: 'weeks', l: 'A few weeks' },
        { v: 'months', l: 'A few months' },
        { v: 'longer', l: 'Longer than that' },
      ];
      const intensity = Number(state.intensity || 5);
      const label = intensity <= 2 ? 'Mild — manageable most days'
                  : intensity <= 4 ? 'Noticeable but not overwhelming'
                  : intensity <= 6 ? 'Distracting, affecting some daily life'
                  : intensity <= 8 ? 'Heavy, affecting most of daily life'
                  : 'Very intense — hard to get through the day';
      return `
        <div class="field">
          <label class="field-label">How long has this been happening?</label>
          <div class="choice-grid" style="grid-template-columns: repeat(4, 1fr); gap: 8px;">
            ${durations.map(d => `
              <button class="choice ${state.duration === d.v ? 'selected' : ''}" data-duration="${d.v}" type="button" style="padding: 12px 10px;">
                <span class="check">${icon('check', 12)}</span>
                <div class="label" style="font-size: 13px;">${d.l}</div>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="field" style="margin-top: 22px;">
          <label class="field-label">How intense does it feel — most days?</label>
          <div class="slider-card">
            <div class="intensity-display num" id="intens-disp">${intensity}<span style="font-size: 1.2rem; color: var(--muted);"> / 10</span></div>
            <div class="intensity-label" id="intens-label">${label}</div>
            <input type="range" class="slider" id="intensity-slider" min="1" max="10" step="1" value="${intensity}" style="margin-top: 14px;">
            <div class="scale-rail">
              <span>Mild</span><span>Moderate</span><span>Significant</span><span>Severe</span>
            </div>
          </div>
        </div>
      `;
    }

    function stepImpact() {
      const opts = [
        { v: 'sleep', l: 'Sleep' },
        { v: 'work', l: 'Work or school' },
        { v: 'concentration', l: 'Concentration / focus' },
        { v: 'energy', l: 'Energy levels' },
        { v: 'relationships', l: 'Relationships' },
        { v: 'appetite', l: 'Appetite or eating' },
        { v: 'self-care', l: 'Self-care routines' },
        { v: 'mood', l: 'Mood or outlook' },
      ];
      return `
        <div class="choice-grid" style="grid-template-columns: repeat(2, 1fr);">
          ${opts.map(o => `
            <button class="choice ${state.impact.includes(o.v) ? 'selected' : ''}" data-impact="${o.v}" type="button">
              <span class="check">${icon('check', 12)}</span>
              <div class="label">${o.l}</div>
            </button>
          `).join('')}
        </div>
      `;
    }

    function stepSafety() {
      const opts = [
        { v: 'none', l: 'No safety concerns', s: 'I am not having thoughts of harming myself or others.' },
        { v: 'passing', l: 'Occasional difficult thoughts', s: 'I have had passing thoughts but no plans or intent.' },
        { v: 'recent', l: 'Recent worsening thoughts', s: 'These thoughts have been more frequent or intense recently.' },
        { v: 'immediate', l: 'Immediate concern', s: "I'm thinking about harming myself, or someone is in immediate danger." },
      ];
      return `
        <div class="choice-grid" style="grid-template-columns: 1fr;">
          ${opts.map(o => `
            <button class="choice ${state.safety === o.v ? 'selected' : ''}" data-safety="${o.v}" type="button">
              <span class="check">${icon('check', 12)}</span>
              <div>
                <div class="label">${o.l}</div>
                <div class="sub">${o.s}</div>
              </div>
            </button>
          `).join('')}
        </div>
      `;
    }

    function stepPreference() {
      const opts = [
        { v: 'therapy', l: 'Therapy / counseling', s: 'Talk-based support with a licensed clinician.' },
        { v: 'medication', l: 'Medication evaluation', s: 'Speak with a prescriber about possible medication.' },
        { v: 'group', l: 'Support group', s: 'Peer support with others going through similar things.' },
        { v: 'community', l: 'Community clinic', s: 'Affordable, in-person, comprehensive services.' },
        { v: 'self', l: 'Self-guided for now', s: "I want to start with resources I can use on my own." },
        { v: 'unsure', l: "I'm not sure", s: "That's okay. We'll suggest a path based on your situation." },
      ];
      return `
        <div class="choice-grid">
          ${opts.map(o => `
            <button class="choice ${state.preference === o.v ? 'selected' : ''}" data-preference="${o.v}" type="button">
              <span class="check">${icon('check', 12)}</span>
              <div>
                <div class="label">${o.l}</div>
                <div class="sub">${o.s}</div>
              </div>
            </button>
          `).join('')}
        </div>
      `;
    }

    function stepPractical() {
      const insurance = state.insurance || '';
      const modality = state.modality || '';
      const urgency = state.urgency || '';
      return `
        <div class="grid grid-2" style="gap: 18px;">
          <div class="field">
            <label class="field-label">Insurance or payment preference</label>
            <select class="select" id="insurance-sel">
              <option value="" ${!insurance ? 'selected' : ''}>Select an option</option>
              <option ${insurance === 'aetna' ? 'selected' : ''}>Aetna</option>
              <option ${insurance === 'bcbs' ? 'selected' : ''}>Blue Cross Blue Shield</option>
              <option ${insurance === 'cigna' ? 'selected' : ''}>Cigna</option>
              <option ${insurance === 'united' ? 'selected' : ''}>UnitedHealthcare</option>
              <option ${insurance === 'kaiser' ? 'selected' : ''}>Kaiser Permanente</option>
              <option ${insurance === 'medicaid' ? 'selected' : ''}>Medicaid / Medi-Cal</option>
              <option ${insurance === 'medicare' ? 'selected' : ''}>Medicare</option>
              <option ${insurance === 'employer' ? 'selected' : ''}>Employer EAP</option>
              <option ${insurance === 'self' ? 'selected' : ''}>Self-pay / sliding scale</option>
              <option ${insurance === 'uninsured' ? 'selected' : ''}>Uninsured</option>
              <option ${insurance === 'unsure' ? 'selected' : ''}>I'm not sure</option>
            </select>
            <span class="field-hint">Helps us filter out options you'd be turned away from.</span>
          </div>

          <div class="field">
            <label class="field-label">State you live in</label>
            <select class="select" id="state-sel">
              <option value="">Select a state</option>
              ${['California','Colorado','Florida','Illinois','Massachusetts','New York','Oregon','Texas','Washington']
                .map(s => `<option ${state.stateName === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
            <span class="field-hint">Telehealth providers are typically licensed by state.</span>
          </div>
        </div>

        <div class="field" style="margin-top: 18px;">
          <label class="field-label">Telehealth or in-person?</label>
          <div class="choice-grid" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
            ${['Telehealth','In-person','Either is fine'].map(o => `
              <button class="choice ${modality === o ? 'selected' : ''}" data-modality="${o}" type="button" style="padding: 12px;">
                <span class="check">${icon('check', 12)}</span>
                <div class="label" style="font-size: 13.5px;">${o}</div>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="field" style="margin-top: 18px;">
          <label class="field-label">How soon would you like a first appointment?</label>
          <div class="choice-grid" style="grid-template-columns: repeat(4, 1fr); gap: 8px;">
            ${[
              { v: 'asap', l: 'As soon as possible' },
              { v: '1-2w', l: 'Within 1–2 weeks' },
              { v: 'month', l: 'Within a month' },
              { v: 'flexible', l: 'No rush' },
            ].map(o => `
              <button class="choice ${urgency === o.v ? 'selected' : ''}" data-urgency="${o.v}" type="button" style="padding: 12px;">
                <span class="check">${icon('check', 12)}</span>
                <div class="label" style="font-size: 13px;">${o.l}</div>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function stepReview() {
      const concernLabels = {
        anxiety: 'Anxiety or worry', depression: 'Low mood or sadness', sleep: 'Sleep difficulties',
        stress: 'Stress or burnout', grief: 'Grief or loss', relationships: 'Relationships',
        trauma: 'Past difficult experiences', other: 'Other',
      };
      const safetyLabel = {
        none: 'No safety concerns',
        passing: 'Occasional difficult thoughts',
        recent: 'Recent worsening thoughts',
        immediate: 'Immediate concern',
      };
      const preferenceLabel = {
        therapy: 'Therapy / counseling', medication: 'Medication evaluation',
        group: 'Support group', community: 'Community clinic',
        self: 'Self-guided for now', unsure: "I'm not sure",
      };
      const urgencyLabel = { asap: 'As soon as possible', '1-2w': 'Within 1–2 weeks', month: 'Within a month', flexible: 'No rush' };

      return `
        <div style="background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 6px 22px;">
          <div class="review-section">
            <span class="review-k">Concerns</span>
            <div class="review-v">
              ${(state.concerns || []).length
                ? `<div class="tag-row">${state.concerns.map(c => `<span class="badge teal">${concernLabels[c] || c}</span>`).join('')}</div>`
                : '<span class="muted">Not specified</span>'}
              ${state.concernDetail ? `<div style="margin-top: 8px; font-size: 13.5px; color: var(--fg-soft);">"${state.concernDetail}"</div>` : ''}
            </div>
          </div>
          <div class="review-section">
            <span class="review-k">Timeline</span>
            <div class="review-v">${({days:'A few days', weeks:'A few weeks', months:'A few months', longer:'Longer than that'})[state.duration] || '—'}</div>
          </div>
          <div class="review-section">
            <span class="review-k">Intensity</span>
            <div class="review-v"><span class="num" style="font-weight:600;">${state.intensity}</span> / 10</div>
          </div>
          <div class="review-section">
            <span class="review-k">Daily impact</span>
            <div class="review-v">
              ${(state.impact || []).length
                ? `<div class="tag-row">${state.impact.map(i => `<span class="badge">${i}</span>`).join('')}</div>`
                : '<span class="muted">Not specified</span>'}
            </div>
          </div>
          <div class="review-section">
            <span class="review-k">Safety check</span>
            <div class="review-v">
              <span class="badge ${state.safety === 'immediate' ? 'danger' : state.safety === 'recent' ? 'warn' : 'success'}">${safetyLabel[state.safety] || '—'}</span>
            </div>
          </div>
          <div class="review-section">
            <span class="review-k">Preference</span>
            <div class="review-v">${preferenceLabel[state.preference] || '—'}</div>
          </div>
          <div class="review-section">
            <span class="review-k">Practical</span>
            <div class="review-v">${state.modality || '—'} · ${state.stateName || '—'} · ${state.insurance || '—'}</div>
          </div>
          <div class="review-section">
            <span class="review-k">Urgency</span>
            <div class="review-v">${urgencyLabel[state.urgency] || '—'}</div>
          </div>
        </div>
      `;
    }

    function bindStepEvents() {
      document.querySelectorAll('[data-concern]').forEach(btn => btn.addEventListener('click', () => {
        const v = btn.dataset.concern;
        const i = state.concerns.indexOf(v);
        if (i === -1) state.concerns.push(v); else state.concerns.splice(i, 1);
        persist(); render();
      }));
      const detail = document.getElementById('concern-detail');
      if (detail) detail.addEventListener('input', () => { state.concernDetail = detail.value; persist(); });

      document.querySelectorAll('[data-duration]').forEach(btn => btn.addEventListener('click', () => {
        state.duration = btn.dataset.duration; persist(); render();
      }));
      const slider = document.getElementById('intensity-slider');
      if (slider) {
        slider.addEventListener('input', () => {
          state.intensity = Number(slider.value);
          const v = state.intensity;
          const label = v <= 2 ? 'Mild — manageable most days'
                      : v <= 4 ? 'Noticeable but not overwhelming'
                      : v <= 6 ? 'Distracting, affecting some daily life'
                      : v <= 8 ? 'Heavy, affecting most of daily life'
                      : 'Very intense — hard to get through the day';
          document.getElementById('intens-disp').innerHTML = `${v}<span style="font-size: 1.2rem; color: var(--muted);"> / 10</span>`;
          document.getElementById('intens-label').textContent = label;
          persist();
        });
      }
      document.querySelectorAll('[data-impact]').forEach(btn => btn.addEventListener('click', () => {
        const v = btn.dataset.impact;
        const i = state.impact.indexOf(v);
        if (i === -1) state.impact.push(v); else state.impact.splice(i, 1);
        persist(); render();
      }));
      document.querySelectorAll('[data-safety]').forEach(btn => btn.addEventListener('click', () => {
        state.safety = btn.dataset.safety; persist(); render();
      }));
      document.querySelectorAll('[data-preference]').forEach(btn => btn.addEventListener('click', () => {
        state.preference = btn.dataset.preference; persist(); render();
      }));
      document.querySelectorAll('[data-modality]').forEach(btn => btn.addEventListener('click', () => {
        state.modality = btn.dataset.modality; persist(); render();
      }));
      document.querySelectorAll('[data-urgency]').forEach(btn => btn.addEventListener('click', () => {
        state.urgency = btn.dataset.urgency; persist(); render();
      }));
      const insSel = document.getElementById('insurance-sel');
      if (insSel) insSel.addEventListener('change', () => { state.insurance = insSel.options[insSel.selectedIndex].text === 'Select an option' ? '' : insSel.options[insSel.selectedIndex].text; persist(); });
      const stateSel = document.getElementById('state-sel');
      if (stateSel) stateSel.addEventListener('change', () => { state.stateName = stateSel.value; persist(); });

      const crIco = document.getElementById('cr-ico');
      if (crIco) crIco.innerHTML = icon('alert', 18);
    }

    render();
  </script>
</body>
</html>
