<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Provider profile</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .reg-wrap { max-width: 880px; margin: 0 auto; }
    .form-section {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-1);
      margin-bottom: 18px;
    }
    .form-section .inner {
      background: var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 28px;
    }
    .form-section h3 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; letter-spacing: -0.018em; margin: 0 0 6px; }
    .form-section .sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
    .verify-stages { display: flex; gap: 10px; margin-bottom: 8px; }
    .vs {
      flex: 1; padding: 12px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      background: var(--surface);
      display: flex; gap: 10px; align-items: center;
    }
    .vs .step-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--surface-sunk);
      color: var(--muted);
      display: grid; place-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .vs.done .step-dot { background: var(--success-soft); color: oklch(38% 0.11 158); }
    .vs.active .step-dot { background: linear-gradient(180deg, var(--teal), var(--teal-deep)); color: white; }
    .vs .t { font-size: 12.5px; font-weight: 500; color: var(--fg); }
    .vs .d { font-size: 11px; color: var(--muted); margin-top: 1px; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    document.getElementById('app-root').innerHTML = appShellHTML(`
      <div class="reg-wrap enter">
        <div style="margin-bottom: 22px;">
          <span class="kicker">Provider profile</span>
          <h2 class="h2" style="margin: 8px 0 4px;">Your practice profile.</h2>
          <p style="color: var(--muted); margin: 0; font-size: 14.5px;">This is what Wise Care uses to match users to your practice. You decide what's published.</p>
        </div>

        <div class="form-section">
          <div class="inner">
            <h3>Verification status</h3>
            <p class="sub">Your profile goes through three steps before listings appear to users. Most providers complete this in 2–3 business days.</p>
            <div class="verify-stages">
              <div class="vs done"><div class="step-dot" id="vs1"></div><div><div class="t">Identity verified</div><div class="d">Approved 4 days ago</div></div></div>
              <div class="vs done"><div class="step-dot" id="vs2"></div><div><div class="t">License confirmed</div><div class="d">Approved 3 days ago</div></div></div>
              <div class="vs active"><div class="step-dot">3</div><div><div class="t">Profile review</div><div class="d">In review · admin team</div></div></div>
              <div class="vs"><div class="step-dot">4</div><div><div class="t">Listings live</div><div class="d">Pending</div></div></div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="inner">
            <h3>Practice details</h3>
            <p class="sub">The information users see on a match card.</p>

            <div class="grid grid-2" style="gap: 18px;">
              <div class="field">
                <label class="field-label">Provider or clinic name</label>
                <input class="input" type="text" value="Quietford Counseling Collective" placeholder="Practice name">
              </div>
              <div class="field">
                <label class="field-label">Practice type</label>
                <select class="select">
                  <option>Individual therapist</option>
                  <option selected>Group practice / collective</option>
                  <option>Community clinic</option>
                  <option>Psychiatric practice</option>
                  <option>Support group / peer-led</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">License type</label>
                <select class="select">
                  <option>LCSW · Licensed Clinical Social Worker</option>
                  <option selected>LMFT · Licensed Marriage &amp; Family Therapist</option>
                  <option>LPC · Licensed Professional Counselor</option>
                  <option>LPCC · Licensed Professional Clinical Counselor</option>
                  <option>Psy.D. · Doctor of Psychology</option>
                  <option>PMHNP · Psychiatric Nurse Practitioner</option>
                  <option>MD · Medical Doctor / Psychiatrist</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">License number</label>
                <input class="input mono" type="text" value="LMF24-091877" placeholder="License #">
                <span class="field-hint">Verified privately. Not shown on listings.</span>
              </div>
              <div class="field">
                <label class="field-label">State of licensure</label>
                <select class="select">
                  <option selected>California</option>
                  <option>Oregon</option>
                  <option>Washington</option>
                  <option>New York</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">Years of practice</label>
                <input class="input num" type="text" value="11" style="max-width: 120px;">
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="inner">
            <h3>Specialties &amp; approach</h3>
            <p class="sub">Helps the matching agent surface your profile for relevant care routes.</p>
            <div class="tag-row" style="margin-bottom: 18px;">
              ${['Anxiety', 'Burnout', 'Sleep', 'Relationships', 'Work stress', 'Caregiver stress'].map(t => `<span class="badge teal"><span class="dot"></span>${t}</span>`).join('')}
              <span class="badge" style="cursor:pointer;">+ Add specialty</span>
            </div>
            <div class="field">
              <label class="field-label">Approach (brief)</label>
              <textarea class="textarea" placeholder="A short description of how you work — methods, populations served, what someone can expect from a first session.">Short-term CBT and ACT-informed therapy for adults with anxiety, sleep, and work-stress patterns. Weekly individual sessions, telehealth-first. Our practice prioritizes accessibility and offers sliding scale.</textarea>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="inner">
            <h3>Access &amp; payment</h3>
            <p class="sub">What kinds of users we should match you with.</p>

            <div class="grid grid-2" style="gap: 18px;">
              <div class="field">
                <label class="field-label">Insurance accepted</label>
                <div class="tag-row">
                  ${['Aetna', 'BCBS', 'Cigna', 'United', 'Self-pay'].map(t => `<span class="badge"><span class="dot"></span>${t}</span>`).join('')}
                  <span class="badge" style="cursor:pointer;">+ Add</span>
                </div>
              </div>
              <div class="field">
                <label class="field-label">Sliding scale</label>
                <div class="row" style="gap: 14px;">
                  <span class="badge teal" style="font-size: 12px;">Yes · $80 – $180</span>
                  <button class="btn btn-quiet btn-sm">Edit range</button>
                </div>
              </div>
              <div class="field">
                <label class="field-label">Modality</label>
                <div class="choice-grid" style="grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                  ${['Telehealth', 'In-person', 'Both'].map((o, i) => `
                    <button class="choice ${i === 0 ? 'selected' : ''}" style="padding: 10px;"><span class="check">${icon('check', 12)}</span><span class="label" style="font-size:13px;">${o}</span></button>
                  `).join('')}
                </div>
              </div>
              <div class="field">
                <label class="field-label">Hours typically available</label>
                <input class="input" type="text" value="Tue / Wed / Thu evenings · 5–8pm" placeholder="e.g. Weekday evenings">
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="inner">
            <h3>Contact</h3>
            <p class="sub">Where Wise Care sends referral notifications. Not displayed publicly.</p>
            <div class="grid grid-2" style="gap: 18px;">
              <div class="field">
                <label class="field-label">Email</label>
                <input class="input" type="email" value="practice@quietfordcollective.example" placeholder="practice@yourdomain.com">
              </div>
              <div class="field">
                <label class="field-label">Phone (optional)</label>
                <input class="input" type="tel" value="(555) 0142-8830" placeholder="(555) 000-0000">
              </div>
            </div>
          </div>
        </div>

        <div class="notice">
          <span id="info-ico"></span>
          <div><strong style="color:var(--fg);">A note on what users see.</strong> Users see your specialty, modality, payment options, and a one-line "why this match" reason. They do not see your license number, internal notes, or the operational details of your verification.</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; flex-wrap: wrap;">
          <a href="provider-dashboard.html" class="btn btn-ghost">← Cancel</a>
          <button class="btn btn-primary" id="save-prof">Save profile<span class="inner">→</span></button>
        </div>

      </div>
    `);

    mountAppShell({
      active: 'provider-register',
      title: 'Practice profile',
      crumbs: ['Practice', 'Profile'],
      actions: '',
    });

    document.getElementById('info-ico').innerHTML = icon('info', 16);
    document.getElementById('vs1').innerHTML = icon('check', 12);
    document.getElementById('vs2').innerHTML = icon('check', 12);
    document.getElementById('save-prof').addEventListener('click', () => toast('Profile saved · listings live within 24 hours'));
  </script>
</body>
</html>
