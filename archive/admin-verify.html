<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Provider verification</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .verify-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: flex-start;
    }
    @media (max-width: 1100px) { .verify-grid { grid-template-columns: 1fr; } }

    .queue {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .queue-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono);
      font-size: 11.5px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .q-item {
      padding: 16px 18px;
      border-bottom: 1px solid var(--hairline);
      cursor: pointer;
      transition: background var(--t-fast);
    }
    .q-item:hover { background: var(--surface-2); }
    .q-item.selected { background: var(--teal-soft); }
    .q-item:last-child { border-bottom: 0; }

    .checklist {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 18px;
    }
    .chk-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .chk-item:last-child { border-bottom: 0; }
    .chk-item .box {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--border-2);
      flex-shrink: 0;
      display: grid; place-items: center;
      cursor: pointer;
      background: var(--surface);
    }
    .chk-item .box.checked { background: var(--teal-deep); border-color: var(--teal-deep); color: white; }
    .chk-item .box svg { opacity: 0; }
    .chk-item .box.checked svg { opacity: 1; }
    .chk-item .body strong { font-size: 13.5px; font-weight: 600; color: var(--fg); display: block; }
    .chk-item .body span { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    let selectedId = MOCK_PROVIDERS_PENDING[0].id;
    let checks = { license: true, state: true, insurance: false, specialty: true, references: false, photo: false };

    function render() {
      const p = MOCK_PROVIDERS_PENDING.find(x => x.id === selectedId) || MOCK_PROVIDERS_PENDING[0];

      document.getElementById('app-root').innerHTML = appShellHTML(`
        <div class="enter">
          <div style="margin-bottom: 22px;">
            <span class="kicker">Verification queue · ${MOCK_PROVIDERS_PENDING.length} pending</span>
            <h2 class="h2" style="margin: 8px 0 4px;">Provider verification.</h2>
            <p style="color: var(--muted); margin: 0; font-size: 14.5px;">Review license, state, and basic profile completeness before a provider can appear in user matches.</p>
          </div>

          <div class="verify-grid">
            <div class="queue">
              <div class="queue-head">
                <span>QUEUE · ${MOCK_PROVIDERS_PENDING.length}</span>
                <span>SLA: 2 BUSINESS DAYS</span>
              </div>
              ${MOCK_PROVIDERS_PENDING.map(pp => `
                <div class="q-item ${pp.id === selectedId ? 'selected' : ''}" data-id="${pp.id}">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span style="font-weight: 600; font-size: 14px;">${pp.name}</span>
                    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em;">${pp.submitted}</span>
                  </div>
                  <div style="font-size: 12px; color: var(--muted); margin-bottom: 6px;">${pp.license}</div>
                  <div style="display: flex; gap: 5px;">
                    <span class="badge">${pp.state}</span>
                    ${pp.telehealth ? '<span class="badge">Telehealth</span>' : ''}
                    ${pp.slidingScale ? '<span class="badge teal">Sliding scale</span>' : ''}
                  </div>
                </div>
              `).join('')}
            </div>

            <div>
              <div class="card">
                <div class="card-head">
                  <div>
                    <h3>${p.name}</h3>
                    <div class="sub">${p.license} · ${p.state} · Submitted ${p.submitted}</div>
                  </div>
                  <span class="badge warn"><span class="dot"></span>UNDER REVIEW</span>
                </div>

                <div class="grid grid-2" style="gap: 14px; margin-bottom: 18px;">
                  <div style="padding: 14px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md);">
                    <div style="font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">Specialty</div>
                    <div style="font-size: 14px; font-weight: 500; margin-top: 4px;">${p.specialty}</div>
                  </div>
                  <div style="padding: 14px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md);">
                    <div style="font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">Insurance accepted</div>
                    <div style="font-size: 14px; font-weight: 500; margin-top: 4px;">${p.insurance}</div>
                  </div>
                  <div style="padding: 14px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md);">
                    <div style="font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">Modality</div>
                    <div style="font-size: 14px; font-weight: 500; margin-top: 4px;">${p.telehealth ? 'Telehealth' : 'In-person'}</div>
                  </div>
                  <div style="padding: 14px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md);">
                    <div style="font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">Sliding scale</div>
                    <div style="font-size: 14px; font-weight: 500; margin-top: 4px;">${p.slidingScale ? 'Yes' : 'No'}</div>
                  </div>
                </div>

                <h4 style="margin: 0 0 12px; font-size: 13px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-weight: 600;">Verification checklist</h4>
                <div class="checklist">
                  ${[
                    ['license', 'License number verified', 'Cross-checked against state board database'],
                    ['state', 'State of licensure confirmed', 'Active in good standing'],
                    ['insurance', 'Insurance panel verified', 'Confirm in-network panels for top 3 plans'],
                    ['specialty', 'Specialty claims reasonable', 'Matches license type and scope'],
                    ['references', 'Professional references', '2 of 2 received'],
                    ['photo', 'Profile photo (optional)', 'Not required for verification'],
                  ].map(([k, t, d]) => `
                    <div class="chk-item">
                      <div class="box ${checks[k] ? 'checked' : ''}" data-check="${k}">${icon('check', 14)}</div>
                      <div class="body">
                        <strong>${t}</strong>
                        <span>${d}</span>
                      </div>
                    </div>
                  `).join('')}
                </div>

                <div class="notice" style="margin-top: 18px;">
                  <span id="info-ico"></span>
                  <div><strong style="color: var(--fg);">Privacy note.</strong> License and credentialing data are stored separately from public listings. Users only see specialty, modality, payment options, and approach.</div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap;">
                  <button class="btn btn-primary" id="approve-btn">Approve &amp; publish<span class="inner">→</span></button>
                  <button class="btn btn-soft" id="more-btn">Request more info</button>
                  <button class="btn btn-ghost" id="hold-btn">Hold for review</button>
                  <button class="btn btn-danger" id="reject-btn">Reject</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `);

      mountAppShell({
        active: 'admin-verify',
        title: 'Provider verification',
        crumbs: ['Operations', 'Verification'],
        actions: '',
      });

      document.getElementById('info-ico').innerHTML = icon('info', 16);

      document.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => { selectedId = b.dataset.id; render(); }));
      document.querySelectorAll('[data-check]').forEach(b => b.addEventListener('click', () => { checks[b.dataset.check] = !checks[b.dataset.check]; render(); }));
      document.getElementById('approve-btn').addEventListener('click', () => toast('Provider approved · listing live'));
      document.getElementById('more-btn').addEventListener('click', () => toast('Info request sent to provider'));
      document.getElementById('hold-btn').addEventListener('click', () => toast('Held for senior review'));
      document.getElementById('reject-btn').addEventListener('click', () => toast('Application rejected'));
    }

    render();
  </script>
</body>
</html>
