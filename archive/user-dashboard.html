<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Your dashboard</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .welcome-card {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-1);
      overflow: hidden;
    }
    .welcome-card .inner {
      background:
        radial-gradient(80% 100% at 100% 0%, oklch(58% 0.085 195 / 0.10), transparent 60%),
        var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 28px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 28px;
      align-items: center;
    }
    @media (max-width: 800px) { .welcome-card .inner { grid-template-columns: 1fr; } }
    .welcome-card h2 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 2.4vw, 1.85rem);
      font-weight: 600;
      letter-spacing: -0.022em;
      margin: 10px 0 8px;
      line-height: 1.15;
    }
    .welcome-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    @media (max-width: 800px) { .status-strip { grid-template-columns: 1fr 1fr; } }
    .status-cell {
      padding: 18px 20px;
      border-right: 1px solid var(--hairline);
    }
    .status-cell:last-child { border-right: 0; }
    @media (max-width: 800px) {
      .status-cell:nth-child(2) { border-right: 0; }
      .status-cell { border-bottom: 1px solid var(--hairline); }
      .status-cell:nth-child(3), .status-cell:nth-child(4) { border-bottom: 0; }
    }
    .status-cell .k { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); }
    .status-cell .v { font-size: 1.05rem; font-weight: 600; margin-top: 6px; }
    .status-cell .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .grid-main {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
    }
    @media (max-width: 1000px) { .grid-main { grid-template-columns: 1fr; } }

    .next-card {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 22px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
    }
    .next-card .ico {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--teal), var(--teal-deep));
      color: white;
      display: grid; place-items: center;
      flex-shrink: 0;
      box-shadow: var(--sh-1);
    }
    .next-card .body { flex: 1; }
    .next-card .body h3 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.012em; margin: 0 0 4px; }

    .provider-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .provider-row:last-child { border-bottom: 0; }
    .provider-avatar {
      width: 38px; height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, oklch(94% 0.025 195), oklch(90% 0.04 230));
      color: var(--teal-deep);
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }
    .provider-name { font-weight: 500; font-size: 14px; }
    .provider-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .packet-preview {
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 18px;
      position: relative;
    }
    .packet-preview .line {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px;
      padding: 6px 0;
      color: var(--fg-soft);
    }
    .packet-preview .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 110px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    document.getElementById('app-root').innerHTML = appShellHTML(`
      <div class="enter-stagger stack" style="--gap: 20px;">

        <div class="welcome-card">
          <div class="inner">
            <div>
              <span class="kicker">Welcome back</span>
              <h2>Hi Alex — your care route is ready.</h2>
              <p style="color: var(--muted); margin: 0; max-width: 50ch; line-height: 1.55;">
                Based on what you shared, we suggest <strong style="color: var(--fg-soft);">therapy with a sleep and anxiety focus</strong>. Five support options are waiting for you to review. No action will be taken without your consent.
              </p>
              <div class="welcome-actions">
                <a href="care-route.html" class="btn btn-primary">View care route<span class="inner">Open →</span></a>
                <a href="provider-matching.html" class="btn btn-ghost">See support options</a>
              </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <div style="padding: 14px 16px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: var(--r-md);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <span class="kicker" style="color: var(--muted);">Care journey</span>
                  <span class="badge teal"><span class="dot"></span>Route ready</span>
                </div>
                <div class="step-rail" style="margin-bottom: 8px;">
                  <span class="step done"></span><span class="step done"></span><span class="step done"></span><span class="step active"></span><span class="step"></span><span class="step"></span>
                </div>
                <div style="font-size: 12.5px; color: var(--muted-2);">Step 4 of 6 · Review options</div>
              </div>
              <div style="padding: 14px 16px; background: var(--teal-soft); border: 1px solid oklch(58% 0.085 195 / 0.22); border-radius: var(--r-md); font-size: 13px; color: oklch(32% 0.07 200); display:flex; gap: 10px;">
                <span id="dash-shield"></span>
                <span><strong>Safety check passed.</strong> No immediate risk indicators. If anything changes, crisis support is always one tap away.</span>
              </div>
            </div>
          </div>
        </div>

        <div class="status-strip">
          <div class="status-cell">
            <div class="k">Care status</div>
            <div class="v">Route in progress</div>
            <div class="meta">Started 2 days ago</div>
          </div>
          <div class="status-cell">
            <div class="k">Recommended route</div>
            <div class="v">Therapy · weekly</div>
            <div class="meta">Focus: anxiety, sleep</div>
          </div>
          <div class="status-cell">
            <div class="k">Options matched</div>
            <div class="v num">5</div>
            <div class="meta">3 telehealth · 1 in-person · 1 group</div>
          </div>
          <div class="status-cell">
            <div class="k">Connection requests</div>
            <div class="v num">0 sent</div>
            <div class="meta">Sharing requires your consent</div>
          </div>
        </div>

        <div class="next-card">
          <div class="ico" id="next-ico"></div>
          <div class="body">
            <span class="kicker">Next recommended action</span>
            <h3>Review your matched support options.</h3>
            <p style="color: var(--muted); font-size: 13.5px; margin: 0 0 14px; line-height: 1.55;">
              We've filtered 5 options that fit your insurance, location, and preferences. Save the ones that look right and send a connection request when you're ready.
            </p>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
              <a href="provider-matching.html" class="btn btn-soft btn-sm">Review options →</a>
              <a href="intake.html" class="btn btn-quiet btn-sm">Update intake</a>
            </div>
          </div>
        </div>

        <div class="grid-main">
          <div class="card">
            <div class="card-head">
              <div>
                <h3>Matched support options</h3>
                <div class="sub">Top 3 matches. Open to compare or save.</div>
              </div>
              <a href="provider-matching.html" class="btn btn-quiet btn-sm">See all 5 →</a>
            </div>
            <div>
              <div class="provider-row">
                <div class="provider-avatar">MJ</div>
                <div style="flex: 1;">
                  <div class="provider-name">Dr. M. — Licensed Clinical Therapist</div>
                  <div class="provider-meta">Telehealth · CA · Sliding scale · Anxiety, Sleep</div>
                </div>
                <span class="badge teal">94% match</span>
              </div>
              <div class="provider-row">
                <div class="provider-avatar">QC</div>
                <div style="flex: 1;">
                  <div class="provider-name">Quietford Counseling Collective</div>
                  <div class="provider-meta">Telehealth / In-person · Multi-clinician · Sliding scale</div>
                </div>
                <span class="badge teal">88% match</span>
              </div>
              <div class="provider-row">
                <div class="provider-avatar">KP</div>
                <div style="flex: 1;">
                  <div class="provider-name">Dr. K. — Psychiatric Nurse Practitioner</div>
                  <div class="provider-meta">Medication evaluation · Telehealth · BCBS / Self-pay</div>
                </div>
                <span class="badge teal">81% match</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <div>
                <h3>Follow-up checklist</h3>
                <div class="sub">A calm list, one step at a time.</div>
              </div>
            </div>
            <ul class="check-list">
              <li class="done">
                <div class="box" id="cb1"></div>
                <span class="label">Complete private intake</span>
                <span style="margin-left: auto; font-size: 11px; color: var(--muted); font-family: var(--font-mono);">2 days ago</span>
              </li>
              <li class="done">
                <div class="box" id="cb2"></div>
                <span class="label">View suggested care route</span>
                <span style="margin-left: auto; font-size: 11px; color: var(--muted); font-family: var(--font-mono);">Yesterday</span>
              </li>
              <li>
                <div class="box"></div>
                <span class="label">Save 2–3 support options</span>
                <span style="margin-left: auto; font-size: 11px; color: var(--teal-deep); font-family: var(--font-mono);">Next</span>
              </li>
              <li>
                <div class="box"></div>
                <span class="label">Review &amp; finalize Care Packet</span>
              </li>
              <li>
                <div class="box"></div>
                <span class="label">Send first connection request</span>
              </li>
              <li>
                <div class="box"></div>
                <span class="label">Schedule a follow-up check-in</span>
              </li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <div>
              <h3>Care Packet preview</h3>
              <div class="sub">Saved on your dashboard. Only shared with your consent.</div>
            </div>
            <div style="display: flex; gap: 8px;">
              <a href="care-packet.html" class="btn btn-ghost btn-sm">Open packet</a>
              <a href="connection-request.html" class="btn btn-soft btn-sm">Share with a provider →</a>
            </div>
          </div>
          <div class="packet-preview">
            <div class="line"><span class="label">Main concerns</span><span>Difficulty falling asleep, racing thoughts at night, worry about work performance.</span></div>
            <div class="line"><span class="label">Timeline</span><span>About six weeks. Worse over the last two.</span></div>
            <div class="line"><span class="label">Daily impact</span><span>Concentration, sleep, mood in the morning. Friendships unaffected.</span></div>
            <div class="line"><span class="label">Care goals</span><span>Sleep more consistently. Reduce intensity of evening worry.</span></div>
            <div class="line"><span class="label">Preferences</span><span>Telehealth. Weekday evenings. Insurance: Aetna or self-pay.</span></div>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;">
              <span style="font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em;">DRAFT · NOT YET SHARED</span>
              <a href="care-packet.html" style="font-size: 12.5px; color: var(--teal-deep); font-weight: 500;">View full packet →</a>
            </div>
          </div>
        </div>

        <div class="notice">
          <span class="ico" id="note-ico"></span>
          <div>
            <strong style="color: var(--fg);">A reminder.</strong> Wise Care helps with navigation and preparation. It does not diagnose, treat, or prescribe. If you ever feel in immediate danger, call or text <strong>988</strong> or call <strong>911</strong>.
          </div>
        </div>

      </div>
    `);

    mountAppShell({
      active: 'user-dashboard',
      title: 'Dashboard',
      crumbs: ['Care', 'Dashboard'],
      actions: `
        <button class="btn btn-quiet btn-sm" id="notif-btn">${icon('bell', 16)}</button>
        <a href="signin.html" class="btn btn-ghost btn-sm">Sign out</a>
      `,
    });

    document.getElementById('dash-shield').innerHTML = icon('shield', 16);
    document.getElementById('next-ico').innerHTML = icon('match', 20);
    document.getElementById('cb1').innerHTML = icon('check', 12);
    document.getElementById('cb2').innerHTML = icon('check', 12);
    document.getElementById('note-ico').innerHTML = icon('info', 16);
  </script>
</body>
</html>
