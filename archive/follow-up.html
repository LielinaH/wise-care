<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Follow-up check-in</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .checkin-wrap { max-width: 760px; margin: 0 auto; }
    .checkin-card {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-2);
      margin-bottom: 22px;
    }
    .checkin-card .inner {
      background: var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 32px;
    }
    .q-block { margin-top: 26px; }
    .q-label { font-size: 14.5px; font-weight: 600; color: var(--fg); margin-bottom: 12px; }

    .suggest-card {
      padding: 24px;
      background: linear-gradient(135deg, oklch(98% 0.012 195), oklch(98% 0.012 240));
      border: 1px solid oklch(58% 0.085 195 / 0.22);
      border-radius: var(--r-xl);
      display: flex; gap: 16px; align-items: flex-start;
    }
    .suggest-card .ico {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--teal), var(--teal-deep));
      color: white;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .suggest-card h3 { margin: 0 0 6px; font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; letter-spacing: -0.018em; }
    .suggest-card p { margin: 0 0 14px; font-size: 13.5px; color: var(--fg-soft); line-height: 1.55; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    const state = JSON.parse(localStorage.getItem(STORAGE_KEYS.followup) || '{}');
    state.contacted = state.contacted ?? null;
    state.scheduled = state.scheduled ?? null;
    state.barrier = state.barrier ?? null;
    state.symptoms = state.symptoms ?? 'same';

    function persist() {
      localStorage.setItem(STORAGE_KEYS.followup, JSON.stringify(state));
    }

    const BARRIER_ADVICE = {
      'no-availability': {
        t: 'When availability is tight, broaden the net.',
        d: "We've added 4 community clinic and group support options to your matches. These usually have shorter waitlists. We've also flagged self-guided sleep practices you can start tonight.",
        action: 'View shorter-wait options',
        href: 'provider-matching.html',
      },
      'cost': {
        t: "Cost shouldn't block a first step.",
        d: 'We can switch you to sliding-scale, EAP, or free community resources. The community clinic in your area offers sessions on a $40 sliding scale and accepts uninsured.',
        action: 'See affordable options',
        href: 'provider-matching.html',
      },
      'insurance': {
        t: 'Insurance gaps are common — there are good fallbacks.',
        d: "Three providers we surfaced accept self-pay sliding scale. We can also help draft a request to your insurer for an out-of-network exception, or surface in-network alternatives.",
        action: 'See self-pay options',
        href: 'provider-matching.html',
      },
      'unsure': {
        t: 'Not sure where to start? Start small.',
        d: "Try a peer support group this week — it's free, low-pressure, and a helpful way to learn what kind of care feels right before committing to weekly therapy.",
        action: 'See peer support groups',
        href: 'provider-matching.html',
      },
      'changed': {
        t: 'It is okay to step back.',
        d: "If you'd like to pause, we'll save your Care Packet quietly. You can pick this up any time. If anything shifts, we can also try a different care route — for example, self-guided support.",
        action: 'Pause care navigation',
        href: 'user-dashboard.html',
      },
      'worsening': {
        t: 'If symptoms are worsening, we want to move faster.',
        d: "We've prioritized providers with same-week availability and a community clinic that handles urgent intake calls. If your situation feels acute, please use crisis support.",
        action: 'See urgent options',
        href: 'provider-matching.html',
      },
    };

    function render() {
      const advice = state.barrier ? BARRIER_ADVICE[state.barrier] : null;

      document.getElementById('app-root').innerHTML = appShellHTML(`
        <div class="checkin-wrap enter">

          <div style="margin-bottom: 22px;">
            <span class="kicker">Follow-up · 1 week later</span>
            <h2 class="h2" style="margin: 8px 0 4px;">A quick check-in.</h2>
            <p style="color: var(--muted); margin: 0; font-size: 14.5px; max-width: 60ch;">Did anything happen this week? There's no right answer — most people don't get past the first call on the first try.</p>
          </div>

          <div class="checkin-card">
            <div class="inner">
              <div class="q-block" style="margin-top: 0;">
                <div class="q-label">Did you contact the provider you sent a request to?</div>
                <div class="choice-grid" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
                  ${[
                    { v: 'yes', l: 'Yes, I reached out' },
                    { v: 'partial', l: 'Tried, no response yet' },
                    { v: 'no', l: 'Not yet' },
                  ].map(o => `
                    <button class="choice ${state.contacted === o.v ? 'selected' : ''}" data-contacted="${o.v}" style="padding: 12px;">
                      <span class="check">${icon('check', 12)}</span>
                      <div class="label" style="font-size: 13.5px;">${o.l}</div>
                    </button>
                  `).join('')}
                </div>
              </div>

              <div class="q-block">
                <div class="q-label">Were you able to schedule an appointment?</div>
                <div class="choice-grid" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
                  ${[
                    { v: 'yes', l: 'Yes, appointment scheduled' },
                    { v: 'waitlist', l: "I'm on a waitlist" },
                    { v: 'no', l: 'No appointment yet' },
                  ].map(o => `
                    <button class="choice ${state.scheduled === o.v ? 'selected' : ''}" data-scheduled="${o.v}" style="padding: 12px;">
                      <span class="check">${icon('check', 12)}</span>
                      <div class="label" style="font-size: 13.5px;">${o.l}</div>
                    </button>
                  `).join('')}
                </div>
              </div>

              <div class="q-block">
                <div class="q-label">If something got in the way, what was it?</div>
                <div class="choice-grid">
                  ${[
                    { v: 'no-availability', l: 'No availability', s: 'Waitlists, no slots, scheduling conflicts' },
                    { v: 'cost', l: 'Cost', s: 'Out of pocket too high' },
                    { v: 'insurance', l: 'Insurance issue', s: 'Not in-network, claim issues' },
                    { v: 'unsure', l: 'Not sure what to do', s: 'Felt overwhelmed or stuck' },
                    { v: 'changed', l: 'Changed mind', s: 'Decided to pause or wait' },
                    { v: 'worsening', l: 'Worsening symptoms', s: 'Things feel harder than last week' },
                  ].map(o => `
                    <button class="choice ${state.barrier === o.v ? 'selected' : ''}" data-barrier="${o.v}">
                      <span class="check">${icon('check', 12)}</span>
                      <div>
                        <div class="label">${o.l}</div>
                        <div class="sub">${o.s}</div>
                      </div>
                    </button>
                  `).join('')}
                </div>
              </div>

              <div class="q-block">
                <div class="q-label">How have your symptoms been this week?</div>
                <div class="choice-grid" style="grid-template-columns: repeat(4, 1fr); gap: 8px;">
                  ${[
                    { v: 'better', l: '↑ Better' },
                    { v: 'same', l: '→ About the same' },
                    { v: 'worse', l: '↓ A bit worse' },
                    { v: 'much-worse', l: '↓↓ Much worse' },
                  ].map(o => `
                    <button class="choice ${state.symptoms === o.v ? 'selected' : ''}" data-symptoms="${o.v}" style="padding: 12px;">
                      <span class="check">${icon('check', 12)}</span>
                      <div class="label" style="font-size: 13px;">${o.l}</div>
                    </button>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          ${advice ? `
            <div class="suggest-card enter">
              <div class="ico">${icon('spark', 18)}</div>
              <div style="flex:1;">
                <span class="kicker">AI suggested next action</span>
                <h3 style="margin-top: 8px;">${advice.t}</h3>
                <p>${advice.d}</p>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                  <a href="${advice.href}" class="btn btn-primary btn-sm">${advice.action}<span class="inner">→</span></a>
                  <button class="btn btn-ghost btn-sm" id="update-plan">Update action plan</button>
                </div>
              </div>
            </div>
          ` : `
            <div class="notice" style="font-size: 13.5px;">
              <span id="info-ico"></span>
              <div>Once you select a barrier (if any), we'll suggest a specific next action based on what got in the way. There's no penalty for not having made progress — most people don't on the first try.</div>
            </div>
          `}

          ${state.symptoms === 'much-worse' ? `
            <div class="notice danger" style="margin-top: 14px;">
              <span id="danger-ico"></span>
              <div><strong>If things feel much worse, please reach out now.</strong> You don't have to wait for a scheduled appointment. Call or text <strong>988</strong>, or call <strong>911</strong> in an emergency. These services are for exactly this moment.</div>
            </div>
          ` : ''}

          <div style="display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; flex-wrap: wrap;">
            <a href="user-dashboard.html" class="btn btn-ghost">← Back to dashboard</a>
            <button class="btn btn-primary" id="save-checkin">Save check-in &amp; update plan<span class="inner">→</span></button>
          </div>

        </div>
      `);

      mountAppShell({
        active: 'follow-up',
        title: 'Follow-up check-in',
        crumbs: ['Care', 'Follow-up'],
        actions: '',
      });

      const ii = document.getElementById('info-ico'); if (ii) ii.innerHTML = icon('info', 16);
      const di = document.getElementById('danger-ico'); if (di) di.innerHTML = icon('alert', 16);

      document.querySelectorAll('[data-contacted]').forEach(b => b.addEventListener('click', () => { state.contacted = b.dataset.contacted; persist(); render(); }));
      document.querySelectorAll('[data-scheduled]').forEach(b => b.addEventListener('click', () => { state.scheduled = b.dataset.scheduled; persist(); render(); }));
      document.querySelectorAll('[data-barrier]').forEach(b => b.addEventListener('click', () => { state.barrier = b.dataset.barrier; persist(); render(); }));
      document.querySelectorAll('[data-symptoms]').forEach(b => b.addEventListener('click', () => { state.symptoms = b.dataset.symptoms; persist(); render(); }));

      const up = document.getElementById('update-plan'); if (up) up.addEventListener('click', () => toast('Action plan updated'));
      document.getElementById('save-checkin').addEventListener('click', () => {
        persist();
        toast('Check-in saved');
        setTimeout(() => { window.location.href = 'user-dashboard.html'; }, 900);
      });
    }

    render();
  </script>
</body>
</html>
