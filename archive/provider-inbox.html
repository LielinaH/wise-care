<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wise Care — Referral inbox</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .inbox-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 22px;
      align-items: flex-start;
    }
    @media (max-width: 1100px) { .inbox-grid { grid-template-columns: 1fr; } }

    .inbox-list {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .inbox-filter {
      padding: 14px 16px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--hairline);
      display: flex; gap: 8px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      letter-spacing: 0.06em;
    }
    .inbox-filter button {
      padding: 5px 10px;
      border-radius: var(--r-pill);
      color: var(--muted);
      cursor: pointer;
      transition: all var(--t-fast);
    }
    .inbox-filter button.active { background: var(--surface); color: var(--fg); box-shadow: var(--sh-1); }

    .inbox-item {
      display: block;
      padding: 16px 18px;
      border-bottom: 1px solid var(--hairline);
      cursor: pointer;
      transition: background var(--t-fast);
    }
    .inbox-item:hover { background: var(--surface-2); }
    .inbox-item.selected { background: var(--teal-soft); }
    .inbox-item:last-child { border-bottom: 0; }
    .inbox-item .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .inbox-item .name { font-weight: 600; font-size: 14px; }
    .inbox-item .time { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }
    .inbox-item .route { font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
    .inbox-item .row-meta { display: flex; gap: 6px; }

    .detail-pane {
      padding: 6px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--r-xl);
      border: 1px solid var(--hairline);
      box-shadow: var(--sh-2);
    }
    .detail-pane .inner {
      background: var(--surface);
      border-radius: calc(var(--r-xl) - 6px);
      border: 1px solid var(--hairline);
      padding: 28px;
    }
    .detail-head {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 22px;
    }
    .detail-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
    .detail-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; letter-spacing: -0.02em; margin: 4px 0; }
    .detail-sub { font-size: 13.5px; color: var(--muted); }

    .detail-section {
      padding: 14px 0;
      border-bottom: 1px solid var(--hairline);
      display: grid; grid-template-columns: 160px 1fr; gap: 20px;
    }
    .detail-section:last-of-type { border-bottom: 0; }
    .detail-section .k { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding-top: 2px; }
    .detail-section .v { font-size: 14px; line-height: 1.55; color: var(--fg); }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script src="shared/app.js"></script>
  <script>
    let selectedId = MOCK_REFERRALS[0].id;
    let filter = 'all';

    function render() {
      const refs = MOCK_REFERRALS.filter(r => filter === 'all' || (filter === 'high' && r.risk !== 'low') || (filter === 'new' && /hr|days/.test(r.received)));
      const r = MOCK_REFERRALS.find(x => x.id === selectedId) || MOCK_REFERRALS[0];

      document.getElementById('app-root').innerHTML = appShellHTML(`
        <div class="enter">
          <div style="margin-bottom: 22px;">
            <span class="kicker">Referral inbox</span>
            <h2 class="h2" style="margin: 8px 0 4px;">Care Packets shared with your practice.</h2>
            <p style="color: var(--muted); margin: 0; font-size: 14.5px;">Privacy: you see only what each user chose to share. Accept, waitlist, decline, or request more information.</p>
          </div>

          <div class="inbox-grid">
            <div class="inbox-list">
              <div class="inbox-filter">
                <button class="${filter === 'all' ? 'active' : ''}" data-filter="all">ALL (${MOCK_REFERRALS.length})</button>
                <button class="${filter === 'new' ? 'active' : ''}" data-filter="new">NEW</button>
                <button class="${filter === 'high' ? 'active' : ''}" data-filter="high">URGENCY</button>
              </div>
              ${refs.map(ref => `
                <div class="inbox-item ${ref.id === selectedId ? 'selected' : ''}" data-id="${ref.id}">
                  <div class="top">
                    <span class="name">${ref.name}</span>
                    <span class="time">${ref.received}</span>
                  </div>
                  <div class="route">${ref.route}</div>
                  <div class="row-meta">
                    <span class="badge ${ref.risk === 'medium' ? 'warn' : ref.risk === 'high' ? 'danger' : 'success'}">${ref.risk.toUpperCase()} RISK</span>
                    <span class="badge">${ref.insurance}</span>
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="detail-pane">
              <div class="inner">
                <div class="detail-head">
                  <div>
                    <span class="detail-id">${r.id.toUpperCase()} · CARE PACKET SHARED</span>
                    <div class="detail-name">${r.name}</div>
                    <div class="detail-sub">Care route: ${r.route} · Insurance: ${r.insurance}</div>
                  </div>
                  <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                    <span class="badge ${r.risk === 'medium' ? 'warn' : r.risk === 'high' ? 'danger' : 'success'}">${r.risk.toUpperCase()} URGENCY</span>
                    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em;">RECEIVED ${r.received.toUpperCase()}</span>
                  </div>
                </div>

                <div class="detail-section">
                  <span class="k">User shared</span>
                  <div class="v">${r.summary}</div>
                </div>
                <div class="detail-section">
                  <span class="k">Main concerns</span>
                  <div class="v">Anxiety with sleep disruption. Onset ~6 weeks. Concentration affected.</div>
                </div>
                <div class="detail-section">
                  <span class="k">Care goals</span>
                  <div class="v">Sleep more consistently. Reduce evening worry intensity. Maintain work focus over 4–6 weeks.</div>
                </div>
                <div class="detail-section">
                  <span class="k">Safety check</span>
                  <div class="v"><span class="badge success">No safety concerns reported</span></div>
                </div>
                <div class="detail-section">
                  <span class="k">Practical fit</span>
                  <div class="v">Telehealth · ${r.insurance} · Weekday evenings · Sliding scale OK</div>
                </div>
                <div class="detail-section">
                  <span class="k">Outreach message</span>
                  <div class="v" style="background: var(--surface-2); padding: 14px 16px; border-radius: var(--r-md); border: 1px solid var(--hairline); font-size: 13.5px; line-height: 1.6;">
                    "I'm looking to start weekly therapy for anxiety and sleep difficulty that have been ongoing for about six weeks. I'd prefer telehealth in the evenings. I've prepared a short care summary I can share — are you taking new clients in the next two weeks?"
                  </div>
                </div>

                <div style="margin-top: 24px; padding: 16px 18px; background: var(--teal-soft); border: 1px solid oklch(58% 0.085 195 / 0.22); border-radius: var(--r-md); display:flex; gap: 12px; font-size: 13px; color: oklch(32% 0.07 200);">
                  <span id="lock-ico"></span>
                  <span><strong style="color: var(--teal-deep);">You see what the user chose to share.</strong> Their full intake is private. Wise Care does not transmit additional clinical data.</span>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap;">
                  <button class="btn btn-primary" id="accept-btn">Accept referral<span class="inner">→</span></button>
                  <button class="btn btn-soft" id="waitlist-btn">Add to waitlist</button>
                  <button class="btn btn-ghost" id="info-btn">Request more info</button>
                  <button class="btn btn-danger" id="decline-btn">Decline</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `);

      mountAppShell({
        active: 'provider-inbox',
        title: 'Referral inbox',
        crumbs: ['Practice', 'Referrals'],
        actions: `<button class="btn btn-quiet btn-sm">${icon('filter', 14)} Filter</button>`,
      });

      document.getElementById('lock-ico').innerHTML = icon('lock', 14);
      document.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => { selectedId = b.dataset.id; render(); }));
      document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => { filter = b.dataset.filter; render(); }));
      document.getElementById('accept-btn').addEventListener('click', () => toast('Referral accepted · scheduling invite sent'));
      document.getElementById('waitlist-btn').addEventListener('click', () => toast('Added to waitlist · user notified'));
      document.getElementById('info-btn').addEventListener('click', () => toast('Info request sent'));
      document.getElementById('decline-btn').addEventListener('click', () => toast('Referral declined · user re-routed to alternates'));
    }

    render();
  </script>
</body>
</html>
